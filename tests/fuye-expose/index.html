<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>职场选择诊断</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#1a1a28;color:#e8e0d0;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:480px;min-height:100vh;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;min-height:100vh;padding:24px 28px}
.screen.active{display:flex}
.cover{justify-content:center;align-items:center;text-align:center;gap:24px}
.cover h1{font-size:34px;font-weight:900;line-height:1.3;letter-spacing:2px}
.cover h1 span{color:#d4b87a}
.cover .sub{font-size:15px;color:#8a8070;line-height:1.7;max-width:300px}
.cover .btn-start{margin-top:16px;padding:15px 56px;font-size:19px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#1a1a28;border:none;border-radius:40px;cursor:pointer;letter-spacing:2px;transition:transform .15s}
.cover .btn-start:active{transform:scale(.96)}
.progress-wrap{padding:8px 0 20px}
.progress-bar{height:4px;background:#2a2a38;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a96e,#d4b87a);border-radius:2px;transition:width .3s}
.progress-label{font-size:13px;color:#6a6558;margin-top:8px;text-align:right}
.q-area{flex:1;display:flex;flex-direction:column;gap:20px}
.q-area .q-text{font-size:26px;font-weight:700;line-height:1.4}
.options{display:flex;flex-direction:column;gap:12px}
.opt{padding:22px 20px;border-radius:16px;background:#242430;border:1.5px solid #2e2e3c;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:14px}
.opt:active{transform:scale(.98);border-color:#c9a96e;background:#2a2a38}
.opt .letter{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.opt.a .letter{background:rgba(201,169,110,.15);color:#c9a96e}
.opt.b .letter{background:rgba(255,107,107,.12);color:#ff6b6b}
.opt .txt{font-size:16px;line-height:1.55;color:#c8c0b0;flex:1}
.loading{justify-content:center;align-items:center;text-align:center;gap:28px}
.loading .spinner{width:56px;height:56px;border:3px solid #2e2e3c;border-top-color:#c9a96e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .msg{font-size:17px;color:#a09880;letter-spacing:1px}
.result{background:linear-gradient(180deg,#1a1a28 0%,#1f1f2e 100%)}
.result .badge{display:inline-block;padding:8px 18px;border:1px solid rgba(201,169,110,.3);border-radius:18px;font-size:14px;color:#c9a96e;letter-spacing:3px;margin-bottom:16px;align-self:flex-start}
.result .type-name{font-size:38px;font-weight:900;margin-bottom:8px}
.result .tagline{font-size:19px;color:#d4b87a;margin-bottom:4px}
.result .sub{font-size:15px;color:#8a8070;margin-bottom:28px}
.score-bar{margin-bottom:24px;display:flex;align-items:center;gap:12px}
.score-bar .s-label{font-size:14px;color:#8a8070;min-width:50px;text-align:right}
.score-bar .s-track{flex:1;height:24px;background:#242430;border-radius:12px;overflow:hidden;display:flex}
.score-bar .s-fill-a{height:100%;background:linear-gradient(90deg,#c9a96e,#d4b87a);transition:width .6s ease}
.score-bar .s-fill-b{height:100%;background:linear-gradient(90deg,#ff6b6b,#e05555);transition:width .6s ease}
.score-bar .s-pct{font-size:16px;color:#d4b87a;font-weight:700;min-width:50px}
.section{margin-bottom:22px}
.section h3{font-size:17px;color:#a09880;margin-bottom:12px;letter-spacing:2px}
.section p{font-size:15px;color:#b8b0a0;line-height:1.75;margin-bottom:10px}
.section .tips{display:flex;flex-direction:column;gap:8px}
.section .tip{padding-left:14px;border-left:2px solid #3a3a48;font-size:14px;color:#b0a898;line-height:1.6}
.golden{margin-bottom:24px;padding:24px;background:#242430;border-radius:14px;text-align:center}
.golden p{font-size:17px;color:#d4b87a;line-height:1.7;letter-spacing:1px}
.share-btn{display:block;width:100%;padding:15px;font-size:17px;font-weight:700;background:linear-gradient(135deg,#c9a96e,#a6844d);color:#1a1a28;border:none;border-radius:30px;cursor:pointer;letter-spacing:2px;margin-bottom:10px}
.share-btn:active{transform:scale(.98)}
.share-hint{text-align:center;font-size:13px;color:#5a5548;margin-bottom:40px}
.footer{text-align:center;padding:20px;font-size:12px;color:#3a3a48;border-top:1px solid #242430}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ===== 配置区（每个选题改这里）=====
const CONFIG = {"title":"该不该在同事面前暴露自己是副业党","subtitle":"5道二选一 · 看清你的副业生存策略","badge":"副业策略诊断","labelA":"公开","labelB":"隐藏","questions":[{"scene":"同事午休时聊起周末干了什么——你周末实际在做副业","A":"大方说\"我在做一个小项目，挺有意思的\"","B":"\"没什么特别的，就是在家躺了躺\"——转移话题"},{"scene":"副业有了稳定收入，你在想要不要告诉关系好的同事","A":"告诉——信任是相互的，TA知道你的另一面也没关系","B":"不说——职场里\"少一件事少一个麻烦\""},{"scene":"有同事无意间发现了你的副业账号，来问你","A":"承认。\"对的，业余搞的小东西。你喜欢的话跟你聊聊\"","B":"含糊过去。\"啊那个啊，帮朋友弄的，不是我\""},{"scene":"你怕什么","A":"副业传到领导耳朵里——被贴上\"不够投入\"的标签","B":"藏着掖着太累——每天切换两套人设，感觉自己像个间谍"},{"scene":"一年后你希望","A":"副业做大了，大大方方辞职。再也不用藏着掖着","B":"主业副业平衡得很好，同事知道也无所谓——因为已经证明不影响工作"}],"reports":{"A":{"name":"公开型","tagline":"你不是不懂低调——是把诚实看得比规避风险更重","sub":"你倾向于让同事知道你在做副业","analysis":"在5个场景中，你大多数选择了坦诚。你不喜欢藏着掖着——不是说你不懂职场规则，是你觉得切换两套人设比冒风险更消耗自己。这种坦率在合适的团队里是一种稀缺品质。","tips":["公开之前先判断环境——不是所有团队都值得你的坦诚","用结果说话——副业做得好，\"不够投入\"的质疑自然消失","把副业和主业的边界划清楚——公开不等于不设防"],"golden":"坦诚是一种选择——不是傻，是你看透了藏着掖着更累。"},"mid":{"name":"策略型","tagline":"你在公开和隐藏之间找到了平衡——看人下菜碟是你的本能","sub":"你既不是完全公开也不是完全隐藏，你会看情况","analysis":"你在不同的人面前展示不同的透明度。这不是两面派——是你在职场里学会的成熟判断。你知道对谁可以坦诚，对谁必须沉默。","tips":["继续打磨你的判断力——对谁亮底牌、什么时机说","偶尔在低风险环境里挑战自己的隐藏本能","不要因为策略而忘了本质上你相信什么"],"golden":"知道什么时候亮牌——这才是真正的职场智慧。"},"B":{"name":"隐藏型","tagline":"你不是不坦诚——是把\"少一个麻烦\"排在了\"说真话\"前面","sub":"你倾向于不让同事知道副业的存在","analysis":"在5个场景中，你大多数选择了沉默。你的第一反应是\"知道的人越少越安全\"。这是一种自我保护——职场里副业确实可能被当作\"不够投入\"的证据。你选择的安全策略在大多数环境里是明智的。","tips":["找一个完全信任的同事——至少在一段关系里不用藏着","如果副业做大了——准备好\"从隐藏到公开\"的过渡策略","不要把隐藏和心虚划等号——你只是在保护自己"],"golden":"沉默有时候是最聪明的策略——只要你别因为藏得太好而忘了自己是谁。"}}};

// ===== 通用引擎 =====
let answers=[],currentQ=0;

function renderCover(){
  document.getElementById('app').innerHTML=`
    <div class="screen active cover">
      <h1>${CONFIG.title}</h1>
      <div class="sub">5道二选一 · 1分钟完成<br>${CONFIG.subtitle}</div>
      <button class="btn-start" onclick="startQuiz()">开始测试</button>
    </div>`;
}

function startQuiz(){answers=[];currentQ=0;renderQuestion();}

function renderQuestion(){
  if(currentQ>=CONFIG.questions.length){showLoading();return;}
  const q=CONFIG.questions[currentQ];
  const pct=Math.round((currentQ/CONFIG.questions.length)*100);
  document.getElementById('app').innerHTML=`
    <div class="screen active">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">${currentQ+1}/${CONFIG.questions.length}</div>
      </div>
      <div class="q-area">
        <div class="q-text">${q.scene}</div>
        <div class="options">
          <div class="opt a" onclick="selectAnswer('A')"><div class="letter">A</div><div class="txt">${q.A}</div></div>
          <div class="opt b" onclick="selectAnswer('B')"><div class="letter">B</div><div class="txt">${q.B}</div></div>
        </div>
      </div>
    </div>`;
}

function selectAnswer(letter){answers.push(letter);currentQ++;currentQ>=CONFIG.questions.length?showLoading():renderQuestion();}

function showLoading(){
  document.getElementById('app').innerHTML=`<div class="screen active loading"><div class="spinner"></div><div class="msg" id="loadMsg">正在分析你的选择...</div></div>`;
  const msgs=['正在分析你的选择...','识别决策模式...','生成专属报告...'];let i=0;
  const t=setInterval(()=>{i++;if(i<msgs.length)document.getElementById('loadMsg').textContent=msgs[i];else{clearInterval(t);setTimeout(showResult,400);}},700);
}

function showResult(){
  const aCount=answers.filter(a=>a==='A').length;
  const bCount=answers.length-aCount;
  const aPct=Math.round(aCount/answers.length*100);
  const bPct=100-aPct;
  let tier; if(aCount>=4) tier='A'; else if(bCount>=4) tier='B'; else tier='mid';
  const r=CONFIG.reports[tier];

  document.getElementById('app').innerHTML=`
    <div class="screen active result">
      <div class="badge">${CONFIG.badge}</div>
      <div class="type-name">${r.name}</div>
      <div class="tagline">${r.tagline}</div>
      <div class="sub">${r.sub}</div>
      <div class="score-bar">
        <span class="s-label">${CONFIG.labelA}</span>
        <div class="s-track"><div class="s-fill-a" style="width:${aPct}%"></div><div class="s-fill-b" style="width:${bPct}%"></div></div>
        <span class="s-label">${CONFIG.labelB}</span>
      </div>
      <div class="section"><h3>📊 分析</h3><p>${r.analysis}</p></div>
      <div class="section"><h3>💡 建议</h3><div class="tips">${r.tips.map(t=>`<div class="tip">${t}</div>`).join('')}</div></div>
      <div class="golden"><p>${r.golden}</p></div>
      <button class="share-btn" onclick="alert('长按截图保存你的诊断报告！')">📤 分享我的诊断结果</button>
      <div class="share-hint">长按保存截图 · 转发给也在纠结的朋友</div>
      <div class="footer">答案仅存储在本机 · 不上传服务器</div>
    </div>`;
  setTimeout(()=>{document.querySelectorAll('.s-fill-a,.s-fill-b').forEach(b=>{const w=b.style.width;b.style.width='0%';setTimeout(()=>{b.style.width=w;},50);});},200);
}

renderCover();
</script>
</body>
</html>
